<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Page</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f8f9fa;
            font-family: 'Segoe UI', sans-serif;
        }

        .gallery {
            padding: 50px 0;
        }

        .card-custom {
            position: relative;
            overflow: hidden;
            border: none;
            border-radius: 10px;
        }

        .card-custom img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.4s;
        }

        .card-custom:hover img {
            transform: scale(1.1);
        }

        .text-box {
            background: #fff;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
            border-radius: 10px;
        }

        .text-box h5 {
            font-weight: 700;
            letter-spacing: 1px;
        }

        .btn-custom {
            border: 1px solid black;
            border-radius: 30px;
            padding: 8px 20px;
            margin-top: 15px;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background: black;
            color: white;
        }

        .img-height {
            height: 250px;
        }

        @media(max-width:768px) {
            .img-height {
                height: 200px;
            }
        }

        body {
            font-family: 'Poppins', sans-serif;
        }

        /* Navbar */
        .navbar {
            background-color: #000;
        }

        .navbar-brand {
            color: #0d6efd !important;
            font-weight: bold;
        }

        img {
            height: 80px;
            width: 100px;
        }
        .box {
    
    position: absolute;
    width: 100px;
    height: 100px;
    animation-name: Rotate;
    animation-duration: 15s;
    animation-iteration-count: infinite;
    animation-timing-function: linear;
    overflow: hidden;
    

}

@keyframes Rotate {
    0% {
        transform: rotatey(0deg);
    }
        
    100% {
        transform: rotatey(360deg);
    }
}
@keyframes Rotate {
    0% {
        transform: rotateY(0deg);
    }

    25% {
        transform: rotateY(0deg);
    }

    30% {
        transform: rotateY(90deg);
    }

    70% {
        transform: rotateY(90deg);
    }

    75% {
        transform: rotateY(0deg);
    }

    100% {
        transform: rotateY(0deg);
    }
}


.box2 {
    width: 100px;
    height: 100px;
    animation-name: Rotate1;
    animation-duration: 15s;
    animation-iteration-count: infinite;
    animation-timing-function: linear;
    animation-fill-mode: backwards;
    animation-direction: reverse;
    overflow: hidden;


}

@keyframes Rotate1 {
    0% {
        transform: rotatey(0deg);
    }
    100% {
         transform: rotatey(360deg);
    }
}
@keyframes Rotate1 {
    0% {
        transform: rotateY(90deg);
    }

    30% {
        transform: rotateY(90deg);
    }

    35% {
        transform: rotateY(0deg);
    }

    65% {
        transform: rotateY(0deg);
    }

    70% {
        transform: rotateY(90deg);
    }

    100% {
        transform: rotateY(90deg);
    }
}

 footer {
            background: #000;
            color: white;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
