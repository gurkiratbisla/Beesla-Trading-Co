<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beesla Trading Company</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Import Google Font */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: url(./image/login\ bg\ farm.jpg);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
        }

        /* Navbar */
        .navbar {
            background-color: #000;
        }

        .navbar-brand {
            color: #0d6efd !important;
            font-weight: bold;
        }

        /* Section Titles */
        .section-title {
            font-weight: bold;
            color: #0d6efd;
            margin-bottom: 30px;
        }

        /* Cards */
        .card {
            border: none;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        /* Agriculture Section */
        .agri {
            background-color: #f8f9fa;
        }

        /* Logo images inside animated boxes */
        .box img,
        .box2 img {
            height: 100%;
            width: 100%;
            object-fit: cover;
            display: block;
        }

        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .box {
            position: absolute;
            width: 70px;
            height: 70px;
            animation-name: Rotate;
            animation-duration: 15s;
            animation-iteration-count: infinite;
            animation-timing-function: linear;
            overflow: hidden;
            flex-shrink: 0;
        }

        @keyframes Rotate {
            0%   { transform: rotateY(0deg); }
            25%  { transform: rotateY(0deg); }
            30%  { transform: rotateY(90deg); }
            70%  { transform: rotateY(90deg); }
            75%  { transform: rotateY(0deg); }
            100% { transform: rotateY(0deg); }
        }

        .box2 {
            width: 70px;
            height: 70px;
            animation-name: Rotate1;
            animation-duration: 15s;
            animation-iteration-count: infinite;
            animation-timing-function: linear;
            animation-fill-mode: backwards;
            animation-direction: reverse;
            overflow: hidden;
            flex-shrink: 0;
        }

        @keyframes Rotate1 {
            0%   { transform: rotateY(90deg); }
            30%  { transform: rotateY(90deg); }
            35%  { transform: rotateY(0deg); }
            65%  { transform: rotateY(0deg); }
            70%  { transform: rotateY(90deg); }
            100% { transform: rotateY(90deg); }
        }

        /* Main login container */
        .container-box {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 15px 40px;
            width: 100%;
        }

        /* Login card wrapper */
        .login-card {
            display: flex;
            width: 100%;
            max-width: 860px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .left-side {
            background: url(./image/login\ div.jpg) no-repeat center/cover;
            flex: 1;
            min-height: 300px;
            padding: 40px 30px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .left-side h2 {
            font-size: clamp(20px, 3vw, 28px);
            font-weight: bold;
            line-height: 1.4;
        }

        .right-side {
            background-color: rgb(63, 63, 63);
            flex: 1;
            padding: 40px;
            color: white;
        }

        .form-control {
            background: #3a354a;
            border: none;
            color: white;
        }

        .form-control::placeholder {
            color: #aaa;
        }

        .form-control:focus {
            background: #3a354a;
            color: white;
            box-shadow: none;
        }

        .btn-custom {
            background: #7b5cff;
            border: none;
            color: white;
        }

        .btn-custom:hover {
            background: #6a4ee6;
        }

        .social-btn {
            border: 1px solid #555;
            color: white;
            width: 48%;
        }

        .social-btn:hover {
            background: #444;
        }

        a {
            color: #a78bfa;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Footer */
        footer {
            background: #000;
            color: white;
            padding: 20px;
            text-align: center;
            margin-top: auto;
        }

        /* ── Tablet (576px – 991px) ── */
        @media (max-width: 991px) {
            .login-card {
                max-width: 680px;
            }

            .right-side {
                padding: 30px 25px;
            }
        }

        /* ── Mobile (≤ 767px) ── */
        @media (max-width: 767px) {
            .container-box {
                padding: 30px 12px 30px;
            }

            .login-card {
                flex-direction: column;
                max-width: 100%;
                border-radius: 16px;
            }

            .left-side {
                min-height: 180px;
                padding: 25px 20px;
            }

            .left-side h2 {
                font-size: 20px;
            }

            .right-side {
                padding: 25px 20px;
            }

            .box,
            .box2 {
                width: 50px;
                height: 50px;
            }
        }

        /* ── Extra Small (≤ 400px) ── */
        @media (max-width: 400px) {
            .box,
            .box2 {
                width: 40px;
                height: 40px;
            }

            .right-side {
                padding: 20px 15px;
            }

            .left-side h2 {
                font-size: 17px;
            }
        }
    </style>

</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <div class="logo-wrapper navbar-brand">
                <div class="box">
                    <img src="./image/beesla t logo.jpeg" alt="">
                </div>
                <div class="box2">
                    <img src="./image/farmlogo.jpg" alt="">
                </div>
            </div>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="./index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="./Login.html">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="./aboutUs.html">About Us</a></li>
                    <!-- <li class="nav-item"><a class="nav-link" href="./gallary.html">Gallary</a></li> -->
                    <li class="nav-item"><a class="nav-link" href="./agriculture.html">Agriculture</a></li>
                    <li class="nav-item"><a class="nav-link" href="./contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-box">
        <div class="login-card">

            <!-- Left Side -->
            <div class="left-side">
                <div>
                    <h3>MSB</h3>
                </div>
                <div>
                    <h2>Beesla Trading Company,<br>Bisla Agricultural Farm</h2>
                </div>
            </div>

            <!-- Right Side -->
            <div class="right-side">
                <h2>Login</h2>
                <p>Login As Admin</p>

                <form>
                    <div class="mb-3">
                        <input type="email" class="form-control" placeholder="Email">
                    </div>

                    <div class="mb-3">
                        <input type="password" class="form-control" placeholder="Enter your password">
                    </div>

                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="terms">
                        <label class="form-check-label" for="terms">
                            I agree to the <a href="#">Terms &amp; Conditions</a>
                        </label>
                    </div>
                    <a href="./admin.html">
                        <button type="submit" class="btn btn-custom w-100 mb-3">Login</button>
                    </a>
                </form>
            </div>

        </div>
    </div>

    <footer>
        <p>© 2026 Beesla Trading Company | All Rights Reserved</p>
    </footer>


</body>

</html>
