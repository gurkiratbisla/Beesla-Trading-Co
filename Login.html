<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beesla Trading Company</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: rgb(50, 54, 56);
            align-items: center;
            text-align: center;
            background-image: url(../image/login\ bg\ farm.jpg);
            background-size: cover;

        }

        /* Navbar */
        .navbar {
            background-color: #000;
        }

        .navbar-brand {
            color: #0d6efd !important;
            font-weight: bold;
        }

        /* Hero Section */
        .hero {
            background-image: url(/image/hero\ background.jpg);
            color: white;
            padding: 100px 0;
            text-align: center;
            background-repeat: no-repeat;
            background-size: cover;
        }

        /* Section Titles */
        .section-title {
            font-weight: bold;
            color: #0d6efd;
            margin-bottom: 30px;
        }

        /* Cards */
        .card {
            border: none;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        /* Agriculture Section */
        .agri {
            background-color: #f8f9fa;
        }

        /* Footer */
        footer {
            background: #000;
            color: white;
            padding: 20px;
            text-align: center;
        }

        img {
            height: 80px;
            width: 100px;
        }

        .box {

            position: absolute;
            width: 100px;
            height: 100px;
            animation-name: Rotate;
            animation-duration: 15s;
            animation-iteration-count: infinite;
            animation-timing-function: linear;
            overflow: hidden;


        }

        @keyframes Rotate {
            0% {
                transform: rotatey(0deg);
            }

            100% {
                transform: rotatey(360deg);
            }
        }

        @keyframes Rotate {
            0% {
                transform: rotateY(0deg);
            }

            25% {
                transform: rotateY(0deg);
            }

            30% {
                transform: rotateY(90deg);
            }

            70% {
                transform: rotateY(90deg);
            }

            75% {
                transform: rotateY(0deg);
            }

            100% {
                transform: rotateY(0deg);
            }
        }


        .box2 {
            width: 100px;
            height: 100px;
            animation-name: Rotate1;
            animation-duration: 15s;
            animation-iteration-count: infinite;
            animation-timing-function: linear;
            animation-fill-mode: backwards;
            animation-direction: reverse;
            overflow: hidden;


        }

        @keyframes Rotate1 {
            0% {
                transform: rotatey(0deg);
            }

            100% {
                transform: rotatey(360deg);
            }
        }

        @keyframes Rotate1 {
            0% {
                transform: rotateY(90deg);
            }

            30% {
                transform: rotateY(90deg);
            }

            35% {
                transform: rotateY(0deg);
            }

            65% {
                transform: rotateY(0deg);
            }

            70% {
                transform: rotateY(90deg);
            }

            100% {
                transform: rotateY(90deg);
            }
        }

        .navbar-brand {
            color: #0d6efd !important;
            font-weight: bold;
        }




        .container-box {
            /* background: #2b2738; */
            /* background-color: red; */
            border-radius: 25px;
            /* overflow: hidden; */
            /* max-width: 1000px; */
            margin-top:110px;
            margin-bottom: 50px;
            /* margin-left: 180px; */
            width: 100%;

            display: flex;
            justify-content: center;
            align-content: center;
        }

        .left-side {
            background: url('/image/login\ div.jpg') no-repeat center/cover;
            width: 40%;
            padding: 30px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .left-side h2 {
            font-size: 28px;
            font-weight: bold;
        }

        .right-side {
            background-color: rgb(63, 63, 63);
            width: 40%;
            padding: 40px;
            color: white;
        }

        .form-control {
            background: #3a354a;
            border: none;
            color: white;
        }

        .form-control::placeholder {
            color: #aaa;
        }

        .form-control:focus {
            background: #3a354a;
            color: white;
            box-shadow: none;
        }

        .btn-custom {
            background: #7b5cff;
            border: none;
            color: white;
        }

        .btn-custom:hover {
            background: #6a4ee6;
        }

        .social-btn {
            border: 1px solid #555;
            color: white;
            width: 48%;
        }

        .social-btn:hover {
            background: #444;
        }

        a {
            color: #a78bfa;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .container-box {
                flex-direction: column;
            }

            .left-side,
            .right-side {
                width: 100%;
            }
        }

        footer {
            background: #000;
            color: white;
            padding: 20px;
            text-align: center;
            margin-top: 150px;
            
        }
    </style>

</head>
